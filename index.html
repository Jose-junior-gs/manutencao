
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ManutencaoPRO"/>
<title>ManutencaoPRO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:140px}
button,input,select,textarea{font-family:inherit}
.header{background:#1a1d27;border-bottom:1px solid #2a2d3e;padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:900px;margin:0 auto}
.header-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;color:#fff}
.bottom-nav{background:#1a1d27;border-top:1px solid #2a2d3e;display:flex;position:fixed;bottom:0;left:0;right:0;z-index:99}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;background:none;border:none;border-top:2px solid transparent;cursor:pointer;color:#64748b;font-size:9px;font-weight:600;gap:2px;min-width:48px}
.nav-btn.active{color:#6c63ff;border-top-color:#6c63ff}
.nav-icon{font-size:17px}
.content{max-width:900px;margin:0 auto;padding:20px 14px}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:14px;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid #2a2d3e;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.card-header-actions{display:flex;gap:6px;flex-shrink:0}
.card-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:14px;padding:16px}
.stat-value{font-size:26px;font-weight:800}
.stat-label{color:#64748b;font-size:12px;margin-top:4px}
.task-item{background:#0f1117;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.task-info{flex:1;min-width:0}
.task-name{font-weight:600;font-size:14px}
.task-sub{color:#64748b;font-size:12px;margin-top:2px}
.task-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-ok{background:#22c55e22;color:#22c55e}
.badge-warn{background:#f59e0b22;color:#f59e0b}
.badge-over{background:#ef444422;color:#ef4444}
.badge-none{background:#1e293b;color:#64748b}
.badge-alarm{background:#6c63ff22;color:#6c63ff}
.btn-primary{background:#6c63ff;color:#fff;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-weight:600;font-size:14px}
.btn-small{background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;font-weight:600}
.btn-outline{background:none;border:1px solid #2a2d3e;color:#64748b;border-radius:10px;padding:10px 16px;cursor:pointer;font-weight:600;font-size:14px}
.btn-icon{background:none;border:1px solid #2a2d3e;color:#64748b;border-radius:8px;padding:5px 8px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-icon:active{border-color:#6c63ff;color:#6c63ff}
.btn-danger-sm{background:none;border:none;cursor:pointer;color:#64748b;font-size:14px;padding:0 4px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:20px;font-weight:700;margin-bottom:18px}
.section-sub{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;margin-top:16px}
.modal-overlay{position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#1a1d27;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:500px;border:1px solid #2a2d3e;max-height:92vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;color:#64748b;font-size:11px;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.field input,.field select,.field textarea{width:100%;background:#0f1117;border:1px solid #2a2d3e;border-radius:8px;padding:11px 12px;color:#e2e8f0;font-size:14px;outline:none}
.field textarea{resize:none;height:72px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.btn-row{display:flex;gap:10px;margin-top:12px}
.bill-item{background:#1a1d27;border:1px solid #2a2d3e;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.bill-item.paid{border-color:#22c55e44}
.bill-name{font-weight:600;font-size:14px}
.bill-name.paid{text-decoration:line-through;color:#64748b}
.bill-sub{color:#64748b;font-size:12px;margin-top:2px}
.bill-info{flex:1;min-width:0}
.bill-value{font-weight:700;font-size:15px;color:#f59e0b;flex-shrink:0}
.bill-value.paid{color:#22c55e}
.hist-item{background:#1a1d27;border:1px solid #2a2d3e;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.empty{background:#1a1d27;border:1px solid #2a2d3e;border-radius:12px;padding:32px;text-align:center;color:#64748b;line-height:1.7}
.alert-pill{background:#ef444422;color:#ef4444;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#6c63ff;flex-shrink:0}
.divider{height:1px;background:#2a2d3e;margin:12px 0}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.alarm-box{background:#6c63ff11;border:1px solid #6c63ff44;border-radius:10px;padding:12px;margin-top:10px}
.alarm-box-title{color:#8b85ff;font-size:12px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px}
.photo-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #2a2d3e}
.chart-bar-wrap{margin-bottom:12px}
.chart-bar-label{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px}
.chart-bar-bg{background:#2a2d3e;border-radius:6px;height:10px}
.chart-bar-fill{background:#6c63ff;border-radius:6px;height:10px}
.alert-banner{background:#ef444422;border:1px solid #ef444444;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.alert-banner-text{flex:1;font-size:13px}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#2a2d3e;border-radius:24px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#64748b;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:#6c63ff22;border:1px solid #6c63ff}
input:checked+.toggle-slider:before{transform:translateX(20px);background:#6c63ff}
.welcome-box{background:#1a1d27;border:1px solid #6c63ff44;border-radius:16px;padding:32px 20px;text-align:center;margin-bottom:24px}
/* Timeline */
.timeline{padding:8px 0}
.tl-item{display:flex;gap:12px;margin-bottom:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-dot{width:12px;height:12px;border-radius:50%;background:#6c63ff;flex-shrink:0;margin-top:4px}
.tl-dot.green{background:#22c55e}
.tl-line{width:2px;background:#2a2d3e;flex:1;min-height:20px}
.tl-content{flex:1;background:#0f1117;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.tl-date{font-size:11px;color:#64748b;margin-bottom:2px}
.tl-name{font-weight:600;font-size:13px}
.tl-detail{font-size:12px;color:#64748b;margin-top:2px}
/* Backup box */
.backup-box{background:#1a1d27;border:1px solid #2a2d3e;border-radius:14px;padding:20px;margin-bottom:12px}
.backup-title{font-weight:700;font-size:15px;margin-bottom:6px}
.backup-sub{color:#64748b;font-size:13px;margin-bottom:14px;line-height:1.5}
/* Vehicle tabs */
.vtab-bar{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px}
.vtab{background:#1a1d27;border:1px solid #2a2d3e;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;white-space:nowrap}
.vtab.active{background:#6c63ff22;border-color:#6c63ff;color:#6c63ff}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-title">🔧 ManutencaoPRO</div>
    <div id="alertPill" style="display:none" class="alert-pill"></div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="dashboard"><span class="nav-icon">⊞</span>Painel</button>
  <button class="nav-btn" data-tab="vehicles"><span class="nav-icon">🚗</span>Veiculos</button>
  <button class="nav-btn" data-tab="home"><span class="nav-icon">🏠</span>Casa</button>
  <button class="nav-btn" data-tab="bills"><span class="nav-icon">💰</span>Contas</button>
  <button class="nav-btn" data-tab="reports"><span class="nav-icon">📊</span>Relatorio</button>
  <button class="nav-btn" data-tab="backup"><span class="nav-icon">💾</span>Backup</button>
</nav>
<div class="content" id="appContent"></div>
<div id="modalContainer"></div>
<script>
var DEFAULT_TASKS=[
  {id:1,name:"Troca de Oleo",interval:5000,unit:"km",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:2,name:"Filtro de Ar",interval:15000,unit:"km",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:3,name:"Rodizio de Pneus",interval:10000,unit:"km",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:4,name:"Pastilha de Freio",interval:30000,unit:"km",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:5,name:"Revisao Geral",interval:12,unit:"meses",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:6,name:"Alinhamento",interval:10000,unit:"km",lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]}
];
var DEFAULT_HOME=[
  {id:1,name:"Limpeza Caixa d Agua",interval:6,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:2,name:"Limpeza Caixa de Gordura",interval:3,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:3,name:"Troca Filtro de Agua",interval:6,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:4,name:"Dedetizacao",interval:12,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:5,name:"Limpeza Ar-Condicionado",interval:6,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:6,name:"Revisao Eletrica",interval:24,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]},
  {id:7,name:"Limpeza Calhas",interval:12,unit:"meses",lastDone:"",notes:"",alarmDate:"",alarmActive:false,photos:[]}
];

function load(){try{var s=localStorage.getItem("mnt_pro_v7");return s?JSON.parse(s):{vehicles:[],home:{tasks:JSON.parse(JSON.stringify(DEFAULT_HOME))},history:[],bills:[]}}catch(e){return{vehicles:[],home:{tasks:JSON.parse(JSON.stringify(DEFAULT_HOME))},history:[],bills:[]};}}
function save(){try{localStorage.setItem("mnt_pro_v7",JSON.stringify(D))}catch(e){}}
var D=load();
var currentTab="dashboard";
var selectedVehicleId=null;

function daysAgo(d){if(!d)return null;return Math.floor((Date.now()-new Date(d))/86400000)}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-Date.now())/86400000)}
function status(t){if(!t.lastDone)return"none";var d=daysAgo(t.lastDone);if(t.unit==="meses"){var p=(d/30)/t.interval;if(p>=1)return"over";if(p>=0.8)return"warn";}return"ok";}
function alarmStatus(t){if(!t.alarmActive||!t.alarmDate)return null;var d=daysUntil(t.alarmDate);if(d<=0)return"fired";if(d<=7)return"soon";return"active";}
function badge(t){var s=status(t);if(s==="none")return'<span class="badge badge-none">Nao registrado</span>';var d=daysAgo(t.lastDone);var l=d===0?"Hoje":d===1?"Ontem":d+"d atras";if(s==="over")return'<span class="badge badge-over">Atrasado - '+l+'</span>';if(s==="warn")return'<span class="badge badge-warn">Atencao - '+l+'</span>';return'<span class="badge badge-ok">Em dia - '+l+'</span>';}
function fmt(s){if(!s)return"";var p=s.split("-");return p[2]+"/"+p[1]+"/"+p[0]}
function today(){return new Date().toISOString().split("T")[0]}
function allTasks(){var r=[];D.home.tasks.forEach(function(t){r.push(Object.assign({},t,{cat:"Casa",sec:"home"}));});D.vehicles.forEach(function(v){v.tasks.forEach(function(t){r.push(Object.assign({},t,{cat:v.name,sec:"vehicle",vid:v.id}));});});return r;}

function requestNotifPerm(){if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();}
function scheduleNotif(title,body,dateStr){if(!("Notification" in window)||Notification.permission!=="granted")return;var ms=new Date(dateStr).getTime()-Date.now();if(ms>0)setTimeout(function(){new Notification(title,{body:body});},Math.min(ms,2147483647));}
function checkAlarms(){return allTasks().filter(function(t){var as=alarmStatus(t);return as==="fired"||as==="soon";});}

function render(){
  var el=document.getElementById("appContent");if(!el)return;
  if(currentTab==="dashboard")el.innerHTML=renderDash();
  else if(currentTab==="vehicles")el.innerHTML=renderVehicles();
  else if(currentTab==="home")el.innerHTML=renderHome();
  else if(currentTab==="bills")el.innerHTML=renderBills();
  else if(currentTab==="reports")el.innerHTML=renderReports();
  else if(currentTab==="backup")el.innerHTML=renderBackup();
  bindEvents();updatePill();
}
function updatePill(){var n=allTasks().filter(function(t){return status(t)==="over"||status(t)==="warn";}).length+checkAlarms().length;var p=document.getElementById("alertPill");if(!p)return;if(n>0){p.style.display="";p.textContent="! "+n;}else p.style.display="none";}

function renderDash(){
  var all=allTasks(),over=all.filter(function(t){return status(t)==="over";}),warn=all.filter(function(t){return status(t)==="warn";}),none=all.filter(function(t){return !t.lastDone;}),ok=all.filter(function(t){return t.lastDone&&status(t)==="ok";});
  var fired=checkAlarms();
  var banner=fired.length>0?'<div class="alert-banner"><span style="font-size:24px">🔔</span><div class="alert-banner-text"><strong style="color:#ef4444">'+fired.length+' alarme(s) disparado(s)!</strong><br>'+fired.map(function(t){return t.name;}).join(", ")+'</div></div>':"";
  var att=over.concat(warn);
  var attHtml=att.length===0?'<div class="empty">Tudo em dia!</div>':att.map(function(t){return'<div class="task-item" style="margin-bottom:8px"><div class="task-info"><div class="task-name">'+t.name+'</div><div class="task-sub">'+t.cat+'</div></div>'+badge(t)+'</div>';}).join("");
  return banner+'<div class="section-title">Painel Geral</div><div class="stats-grid"><div class="stat-card"><div class="stat-value" style="color:#ef4444">'+over.length+'</div><div class="stat-label">Atrasados</div></div><div class="stat-card"><div class="stat-value" style="color:#f59e0b">'+warn.length+'</div><div class="stat-label">Atencao</div></div><div class="stat-card"><div class="stat-value" style="color:#64748b">'+none.length+'</div><div class="stat-label">Nao registrados</div></div><div class="stat-card"><div class="stat-value" style="color:#22c55e">'+ok.length+'</div><div class="stat-label">Em dia</div></div></div><div class="section-sub">Itens que precisam de atencao</div>'+attHtml;
}

function taskItemHtml(t,sec,vid){
  var as=alarmStatus(t);
  var ab=as==="fired"?'<span class="badge badge-over">🔔 Alarme!</span>':as==="soon"?'<span class="badge badge-warn">🔔 Em breve</span>':as==="active"?'<span class="badge badge-alarm">🔔 '+fmt(t.alarmDate)+'</span>':"";
  var ph=t.photos&&t.photos.length>0?'<div style="color:#6c63ff;font-size:11px;margin-top:3px">📷 '+t.photos.length+' foto(s)</div>':"";
  return'<div class="task-item"><div class="task-info"><div class="task-name">'+t.name+'</div><div class="task-sub">Proximo: '+t.interval+' '+t.unit+(t.lastKm?' - Ultimo: '+t.lastKm+' km':'')+'</div>'+ph+'</div><div class="task-actions">'+badge(t)+ab+'<button class="btn-small log-task" data-sec="'+sec+'" data-vid="'+(vid||'')+'" data-tid="'+t.id+'" data-name="'+t.name+'">Registrar</button><button class="btn-danger-sm del-task" data-sec="'+sec+'" data-vid="'+(vid||'')+'" data-tid="'+t.id+'">🗑️</button></div></div>';
}

function renderVehicles(){
  var html='<div class="row"><div class="section-title" style="margin:0">Meus Veiculos</div><button class="btn-primary" id="btnAddVehicle">+ Novo</button></div>';
  if(D.vehicles.length===0)return html+'<div class="welcome-box"><div style="font-size:48px;margin-bottom:12px">🚗</div><div style="font-weight:700;font-size:18px;margin-bottom:8px">Nenhum veiculo cadastrado</div><div style="color:#64748b;font-size:14px;margin-bottom:20px">Clique em "+ Novo" para adicionar seu primeiro veiculo</div></div>';
  D.vehicles.forEach(function(v){
    var vtotal=D.history.filter(function(h){return h.vehicleId===v.id;}).reduce(function(s,h){return s+parseFloat(h.cost||0);},0);
    html+='<div class="card"><div class="card-header"><div class="card-header-left"><div><div style="font-weight:700;font-size:15px">🚗 '+v.name+'</div><div style="color:#64748b;font-size:12px">'+v.model+(vtotal>0?' · R$ '+vtotal.toFixed(2)+' investidos':'')+'</div></div></div><div class="card-header-actions"><button class="btn-icon hist-vehicle" data-vid="'+v.id+'" data-vname="'+v.name+'">📋 Hist.</button><button class="btn-icon edit-vehicle" data-vid="'+v.id+'">✏️</button><button class="btn-icon add-task-vehicle" data-vid="'+v.id+'">+ Tarefa</button><button class="btn-icon del-vehicle" data-vid="'+v.id+'" style="color:#ef4444;border-color:#ef444444">🗑️</button></div></div><div class="card-body">';
    v.tasks.forEach(function(t){html+=taskItemHtml(t,"vehicle",v.id);});
    html+='</div></div>';
  });
  return html;
}

function renderHome(){
  var html='<div class="row"><div class="section-title" style="margin:0">🏠 Casa</div><button class="btn-primary" id="btnAddTaskHome">+ Tarefa</button></div><div class="card"><div class="card-body">';
  D.home.tasks.forEach(function(t){html+=taskItemHtml(t,"home",null);});
  return html+'</div></div>';
}

function renderBills(){
  var unpaid=D.bills.filter(function(b){return !b.paid;}),paid=D.bills.filter(function(b){return b.paid;});
  var total=unpaid.reduce(function(s,b){return s+parseFloat(b.value||0);},0);
  var html='<div class="row"><div class="section-title" style="margin:0">Contas</div><button class="btn-primary" id="btnAddBill">+ Nova</button></div>';
  if(D.bills.length===0)return html+'<div class="empty">Nenhuma conta registrada.</div>';
  function bh(b){return'<div class="bill-item'+(b.paid?" paid":"")+'"><input type="checkbox" class="toggle-bill" data-id="'+b.id+'"'+(b.paid?" checked":"")+'><div class="bill-info"><div class="bill-name'+(b.paid?" paid":"")+'">'+b.name+'</div><div class="bill-sub">'+(b.dueDate?"Vence: "+fmt(b.dueDate):"")+(b.category?" - "+b.category:"")+'</div></div>'+(b.value?'<div class="bill-value'+(b.paid?" paid":"")+'">R$ '+parseFloat(b.value).toFixed(2)+'</div>':"")+'<button class="del-bill" data-id="'+b.id+'" style="background:none;border:none;cursor:pointer;color:#64748b;font-size:14px;padding:0 4px">X</button></div>';}
  if(unpaid.length>0){html+='<div class="section-sub" style="margin-top:0">Em aberto</div>';unpaid.forEach(function(b){html+=bh(b);});}
  if(paid.length>0){html+='<div class="section-sub">Pagas</div>';paid.forEach(function(b){html+=bh(b);});}
  html+='<div class="divider"></div><div class="total-row"><span style="color:#64748b;font-weight:600">Total em aberto</span><span style="font-weight:700;font-size:16px;color:#6c63ff">R$ '+total.toFixed(2)+'</span></div>';
  return html;
}

function renderReports(){
  var history=D.history.filter(function(h){return h.cost&&parseFloat(h.cost)>0;});
  var total=history.reduce(function(s,h){return s+parseFloat(h.cost||0);},0);
  var bycat={};history.forEach(function(h){var c=h.category||"Outro";if(!bycat[c])bycat[c]=0;bycat[c]+=parseFloat(h.cost||0);});
  var maxc=Math.max.apply(null,Object.values(bycat).concat([1]));

function exportBackup(){
  var json=JSON.stringify(D,null,2);
  var blob=new Blob([json],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="manutencao-backup-"+today()+".json";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.createObjectURL(blob);
}

function importBackup(file){
  var r=new FileReader();
  r.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.vehicles||!data.home||!data.history)throw new Error("Formato invalido");
      if(!confirm("Isso vai substituir todos os seus dados atuais. Confirma?"))return;
      D=data;save();render();
      alert("Backup restaurado com sucesso!");
    }catch(err){alert("Arquivo invalido. Selecione um backup exportado pelo ManutencaoPRO.");}
  };
  r.readAsText(file);
}

    '<div class="field-row"><div class="field"><label>Proximo intervalo</label><input type="number" id="fInterval" value="'+ci+'"></div><div class="field"><label>Unidade</label><select id="fUnit">'+uOpts+'</select></div></div>'+

    '<div class="alarm-box"><div class="alarm-box-title">🔔 Alarme Lembrete</div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px">Ativar alarme para verificar</span><label class="toggle-switch"><input type="checkbox" id="fAlarmActive"'+(task&&task.alarmActive?" checked":"")+'><span class="toggle-slider"></span></label></div>'+
    '<div id="alarmDateField" style="display:'+(task&&task.alarmActive?"block":"none")+'"><div class="field" style="margin:0"><label>Me avisar em</label><input type="date" id="fAlarmDate" value="'+(task&&task.alarmDate?task.alarmDate:'')+'"></div><div style="color:#64748b;font-size:11px;margin-top:6px">Voce recebera uma notificacao nessa data</div></div></div>'+
    '<div class="btn-row"><button class="btn-outline" style="flex:1" id="mCan">Cancelar</button><button class="btn-primary" style="flex:1" id="mSav">Salvar</button></div></div></div>';
  document.getElementById("fAlarmActive").addEventListener("change",function(){document.getElementById("alarmDateField").style.display=this.checked?"block":"none";});
  document.getElementById("mOv").addEventListener("click",function(e){if(e.target===this)closeModal();});
  document.getElementById("mCan").addEventListener("click",closeModal);
  document.getElementById("mSav").addEventListener("click",function(){
    var date=document.getElementById("fDate").value;if(!date){alert("Informe a data!");return;}
    var km=document.getElementById("fKm")?document.getElementById("fKm").value:"";
    var cost=document.getElementById("fCost").value;
    var notes=document.getElementById("fNotes").value;
    var interval=parseInt(document.getElementById("fInterval").value)||ci;
    var unit=document.getElementById("fUnit").value;
    var alarmActive=document.getElementById("fAlarmActive").checked;
    var alarmDate=document.getElementById("fAlarmDate")?document.getElementById("fAlarmDate").value:"";
    var photoFiles=document.getElementById("fPhoto").files;
    var taskName="";
    var vehicleId=isV?parseInt(vid):null;
    function finalize(photos){
      if(sec==="home"){var t=D.home.tasks.find(function(t){return t.id===tid;});if(t){t.lastDone=date;t.notes=notes;t.interval=interval;t.unit=unit;t.alarmActive=alarmActive;t.alarmDate=alarmDate;if(!t.photos)t.photos=[];t.photos=t.photos.concat(photos);taskName=t.name;}}
      else{var v2=D.vehicles.find(function(v){return v.id===parseInt(vid);});if(v2){var t2=v2.tasks.find(function(t){return t.id===tid;});if(t2){t2.lastDone=date;if(km)t2.lastKm=km;t2.notes=notes;t2.interval=interval;t2.unit=unit;t2.alarmActive=alarmActive;t2.alarmDate=alarmDate;if(!t2.photos)t2.photos=[];t2.photos=t2.photos.concat(photos);taskName=t2.name;}}}
      if(alarmActive&&alarmDate)scheduleNotif("🔔 ManutencaoPRO","Hora de verificar: "+taskName,alarmDate);
      D.history.unshift({id:Date.now(),date:date,task:taskName,vehicleId:vehicleId,category:sec==="home"?"Casa":(D.vehicles.find(function(v){return v.id===parseInt(vid);})||{name:""}).name,notes:notes,cost:cost,km:km,photos:photos});

    if(photoFiles&&photoFiles.length>0){var photos=[],loaded=0;Array.from(photoFiles).forEach(function(file){var r=new FileReader();r.onload=function(e){photos.push(e.target.result);loaded++;if(loaded===photoFiles.length)finalize(photos);};r.readAsDataURL(file);});}
    else finalize([]);
  });
}

    '<div class="field"><label>Unidade</label><select id="fTU"><option value="km">km</option><option value="meses">meses</option></select></div></div>'+
    '<div class="btn-row"><button class="btn-outline" style="flex:1" id="mCan">Cancelar</button><button class="btn-primary" style="flex:1" id="mSavT">Adicionar</button></div></div></div>';
  if(sec==="home")document.getElementById("fTU").value="meses";
  document.getElementById("mOv").addEventListener("click",function(e){if(e.target===this)closeModal();});
  document.getElementById("mCan").addEventListener("click",closeModal);
  document.getElementById("mSavT").addEventListener("click",function(){
    var name=document.getElementById("fTN").value;if(!name){alert("Informe o nome!");return;}
    var newTask={id:Date.now(),name:name,interval:parseInt(document.getElementById("fTI").value)||6,unit:document.getElementById("fTU").value,lastDone:"",lastKm:"",notes:"",alarmDate:"",alarmActive:false,photos:[]};
    if(sec==="home")D.home.tasks.push(newTask);
    else{var v=D.vehicles.find(function(v){return v.id===vid;});if(v)v.tasks.push(newTask);}
    save();closeModal();render();
  });
}
